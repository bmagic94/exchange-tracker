<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달러 환전 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2023;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0ee;
    --text2: #9a9a95;
    --text3: #5a5a56;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --accent: #e8ff57;
    --accent-dim: rgba(232,255,87,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .mono { font-family: 'DM Mono', monospace; }

  /* Layout */
  .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 1rem;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .rate-hero {
    text-align: right;
  }
  .rate-hero .rate-num {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    color: var(--text);
  }
  .rate-hero .rate-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .rate-badge {
    display: inline-block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 6px;
    font-weight: 500;
  }
  .badge-danger { background: var(--red-dim); color: var(--red); }
  .badge-warn { background: var(--amber-dim); color: var(--amber); }
  .badge-ok { background: var(--green-dim); color: var(--green); }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .refresh-btn:hover { background: var(--bg3); color: var(--text); }

  /* Grid */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1rem; }

  @media (max-width: 700px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .grid4 { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 480px) {
    .app { padding: 0.875rem 0.75rem; }

    /* 헤더 세로 배치 */
    .header { flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .header-left h1 { font-size: 17px; }
    .header-left p { font-size: 11px; }
    .rate-hero { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .rate-hero .rate-num { font-size: 28px; }
    .rate-hero .rate-sub { display: none; }
    .rate-hero-row { display: flex; align-items: baseline; gap: 6px; }
    .rate-hero-actions { display: flex; align-items: center; gap: 6px; margin-top: 0; }
    .refresh-btn { margin-top: 0; padding: 5px 10px; font-size: 11px; }

    /* 탭 가로 스크롤 */
    .tabs { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 7px 10px; font-size: 11px; }

    /* grid 전부 1컬럼 */
    .grid2, .grid3 { grid-template-columns: 1fr; gap: 0.625rem; }
    .grid4 { grid-template-columns: 1fr 1fr; gap: 0.5rem; }

    /* card */
    .card { padding: 0.875rem; }
    .card-sm { padding: 0.75rem; }
    .card-title { font-size: 10px; letter-spacing: 0.06em; margin-bottom: 0.75rem; }

    /* metric */
    .metric { padding: 0.625rem 0.75rem; }
    .metric-label { font-size: 10px; }
    .metric-val { font-size: 16px !important; }
    .metric-sub { font-size: 10px; }

    /* tranche */
    .tranche-price { font-size: 12px; }
    .tranche-desc { font-size: 10px; }
    .tranche-usd { font-size: 12px; }
    .tranche-won { font-size: 10px; }

    /* event */
    .event-name { font-size: 12px; }
    .event-desc { font-size: 10px; }
    .event-impact { font-size: 10px; }

    /* chart */
    .chart-wrap { height: 150px; }

    /* alert */
    .alert-bar { font-size: 11px; padding: 0.6rem 0.75rem; }

    /* sum */
    .sum-label { font-size: 11px; }
    .sum-val { font-size: 12px; }
    .sum-row.total .sum-val { font-size: 14px; }

    /* 테이블 가로 스크롤 */
    .record-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .record-table { min-width: 480px; font-size: 11px; }
    .record-table th { font-size: 10px; }
    .record-table td { padding: 8px 4px 8px 0; font-size: 11px; }

    /* 입력 폼: iOS 줌 방지 font-size 15px+ */
    .rec-form-grid { grid-template-columns: 1fr; gap: 0.5rem; }
    input[type=number], input[type=text], input[type=date] { font-size: 15px; padding: 10px 12px; }

    /* 전략 탭 */
    #tab-strategy .grid2 { grid-template-columns: 1fr; }
    #stratSummary { padding-top: 0; }
    #stratSummary .sum-row { padding: 4px 0; }

    /* 설정 탭 */
    #tab-settings .grid2 { grid-template-columns: 1fr; }
    .btn { font-size: 13px; }
    .btn-sm { font-size: 11px; padding: 6px 10px; }

    /* badge */
    .rate-badge { font-size: 10px; padding: 2px 6px; }
  }


  /* Card */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .card-sm { padding: 1rem; }

  .card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Metric */
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .metric-val {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* Progress */
  .progress-wrap { margin-top: 0.75rem; }
  .progress-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  /* Section title */
  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 0.75rem;
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Tranche list */
  .tranche-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.75rem 0;
    border-bottom: 0.5px solid var(--border);
  }
  .tranche-item:last-child { border-bottom: none; }
  .tranche-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    min-width: 32px;
    text-align: center;
  }
  .tranche-info { flex: 1; }
  .tranche-price { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
  .tranche-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tranche-right { text-align: right; }
  .tranche-usd { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--green); }
  .tranche-won { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .active-tranche { background: rgba(74,222,128,0.04); border-radius: var(--radius-sm); padding: 0.75rem; margin: -0.75rem; }

  /* Event checklist */
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 0.75rem 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
  }
  .event-item:last-child { border-bottom: none; }
  .event-check {
    width: 16px;
    height: 16px;
    border: 0.5px solid var(--border2);
    border-radius: 4px;
    background: var(--bg3);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .event-check.checked { background: var(--green); border-color: var(--green); }
  .event-check.checked::after { content: '✓'; font-size: 10px; color: #000; font-weight: 700; }
  .event-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .event-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .event-impact { font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 4px; }

  /* Input */
  .input-group { margin-bottom: 0.75rem; }
  .input-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: 'DM Mono', monospace; display: block; }
  input[type=number], input[type=text], input[type=date] {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Button */
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #d4eb4f; }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--bg3); }
  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border: 0.5px solid rgba(248,113,113,0.2);
  }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* Record table */
  .record-table { width: 100%; border-collapse: collapse; }
  .record-table th {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-align: left;
    padding: 0 0 8px;
    border-bottom: 0.5px solid var(--border);
    font-weight: 400;
  }
  .record-table td {
    font-size: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    vertical-align: middle;
  }
  .record-table tr:last-child td { border-bottom: none; }
  .record-table td:first-child { color: var(--text3); }
  .record-table .td-usd { color: var(--green); font-weight: 500; }
  .record-table .td-rate { color: var(--blue); }

  .empty-state {
    text-align: center;
    padding: 2rem 0;
    color: var(--text3);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }

  /* Alert bar */
  .alert-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 12px;
    margin-bottom: 0.75rem;
    border: 0.5px solid;
  }
  .alert-green { background: var(--green-dim); border-color: rgba(74,222,128,0.2); color: var(--green); }
  .alert-amber { background: var(--amber-dim); border-color: rgba(251,191,36,0.2); color: var(--amber); }
  .alert-red { background: var(--red-dim); border-color: rgba(248,113,113,0.2); color: var(--red); }

  /* Tab */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Chart */
  .chart-wrap { position: relative; height: 200px; margin: 0.5rem 0; }

  /* Divider */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }

  /* Row layout */
  .flex-row { display: flex; align-items: center; gap: 10px; }
  .flex-end { justify-content: flex-end; }
  .flex-between { justify-content: space-between; }
  .gap-sm { gap: 6px; }

  /* Summary row */
  .sum-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
  }
  .sum-label { color: var(--text3); font-family: 'DM Mono', monospace; }
  .sum-val { color: var(--text); font-family: 'DM Mono', monospace; font-weight: 500; }
  .sum-row.total { padding-top: 10px; border-top: 0.5px solid var(--border); }
  .sum-row.total .sum-label { font-size: 13px; color: var(--text2); }
  .sum-row.total .sum-val { font-size: 16px; color: var(--accent); }

  /* Dot indicator */
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }

  /* Spin animation */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; }

  /* Fade in */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }

  /* Pulse */
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>달러 환전 트래커</h1>
      <p id="lastUpdate" class="mono">마지막 업데이트: —</p>
    </div>
    <div class="rate-hero">
      <div class="rate-hero-row">
        <span class="rate-num mono" id="heroRate">—</span>
        <span class="rate-sub mono">USD/KRW</span>
      </div>
      <div class="rate-hero-actions">
        <div id="heroBadge"></div>
        <button class="refresh-btn" onclick="fetchRate()">
          <span id="refreshIcon">✎</span> 환율 입력
        </button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">대시보드</button>
    <button class="tab-btn" onclick="switchTab('strategy')">매수 전략</button>
    <button class="tab-btn" onclick="switchTab('records')">환전 기록</button>
    <button class="tab-btn" onclick="switchTab('settings')">설정</button>
  </div>

  <!-- TAB: Dashboard -->
  <div class="tab-panel active" id="tab-dashboard">

    <!-- Alert -->
    <div id="alertArea"></div>

    <!-- KPI 4개 -->
    <div class="grid4" id="kpiGrid"></div>

    <!-- 목표 달성률 -->
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title">목표 달러 달성률</div>
      <div id="goalProgress"></div>
    </div>

    <!-- 차트 + 이벤트 -->
    <div class="grid2">
      <div class="card">
        <div class="card-title">환율 추이 (수동 입력 기록)</div>
        <div class="chart-wrap">
          <canvas id="rateChart"></canvas>
        </div>
        <div style="font-size:11px; color:var(--text3); margin-top:6px; font-family:'DM Mono',monospace;">환전 기록 탭에서 내역을 추가하면 차트에 반영됩니다</div>
      </div>
      <div class="card">
        <div class="card-title">이벤트 트리거 체크리스트</div>
        <div id="eventListDash"></div>
      </div>
    </div>

  </div>

  <!-- TAB: Strategy -->
  <div class="tab-panel" id="tab-strategy">

    <div class="grid2">
      <!-- 2단계 -->
      <div class="card">
        <div class="card-title">
          2단계 — 이벤트 트리거
          <span style="font-size:11px; color:var(--blue); font-family:'DM Mono',monospace;">예산의 50%</span>
        </div>
        <div id="strategy2Detail"></div>
      </div>

      <!-- 3단계 -->
      <div class="card">
        <div class="card-title">
          3단계 — MA20 분할 매수
          <span style="font-size:11px; color:var(--green); font-family:'DM Mono',monospace;">예산의 50%</span>
        </div>
        <div id="strategy3Detail"></div>
      </div>
    </div>

    <!-- 전략 요약 -->
    <div class="card">
      <div class="card-title">전략 시뮬레이션 요약</div>
      <div class="grid2">
        <div>
          <div class="chart-wrap" style="height:180px;">
            <canvas id="stratChart"></canvas>
          </div>
        </div>
        <div id="stratSummary" style="padding-top:0.5rem;"></div>
      </div>
    </div>

  </div>

  <!-- TAB: Records -->
  <div class="tab-panel" id="tab-records">

    <!-- 추가 폼 -->
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title">환전 내역 추가</div>
      <div class="grid3 rec-form-grid" style="gap:0.75rem; margin-bottom:0;">
        <div class="input-group" style="margin:0;">
          <label class="input-label">날짜</label>
          <input type="date" id="recDate">
        </div>
        <div class="input-group" style="margin:0;">
          <label class="input-label">환율 (원/달러)</label>
          <input type="number" id="recRate" placeholder="1480" step="1">
        </div>
        <div class="input-group" style="margin:0;">
          <label class="input-label">금액 (원)</label>
          <input type="number" id="recAmount" placeholder="3000000" step="100000">
        </div>
      </div>
      <div style="margin-top:0.75rem; display:flex; gap:8px; align-items:center;">
        <input type="text" id="recNote" placeholder="메모 (예: 3단계 1구간)" style="flex:1;">
        <button class="btn btn-primary" onclick="addRecord()">추가</button>
      </div>
    </div>

    <!-- 기록 테이블 -->
    <div class="card">
      <div class="card-title">
        환전 기록
        <span id="recCount" style="font-size:11px; color:var(--text3); font-family:'DM Mono',monospace;"></span>
      </div>
      <div class="record-wrap"><div id="recordsTable"></div></div>
    </div>

    <!-- 기록 요약 -->
    <div class="card" style="margin-top:1rem;" id="recSummaryCard"></div>

  </div>

  <!-- TAB: Settings -->
  <div class="tab-panel" id="tab-settings">

    <div class="grid2">
      <div class="card">
        <div class="card-title">기본 설정</div>
        <div class="input-group">
          <label class="input-label">총 환전 예산 (원)</label>
          <input type="number" id="setBudget" step="100000">
        </div>
        <div class="input-group">
          <label class="input-label">목표 달러 ($)</label>
          <input type="number" id="setGoal" step="100">
        </div>
        <div class="input-group">
          <label class="input-label">MA20 기준 환율 (원)</label>
          <input type="number" id="setMA20" step="1">
        </div>
        <div class="input-group">
          <label class="input-label">분할 구간 수</label>
          <div style="display:flex; align-items:center; gap:10px;">
            <input type="range" min="2" max="5" step="1" id="setTranches" oninput="document.getElementById('trancheVal').textContent=this.value+'구간'">
            <span id="trancheVal" class="mono" style="font-size:12px; color:var(--text2); min-width:40px;"></span>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">구간 간격 (원)</label>
          <div style="display:flex; align-items:center; gap:10px;">
            <input type="range" min="10" max="50" step="5" id="setGap" oninput="document.getElementById('gapVal').textContent=this.value+'원'">
            <span id="gapVal" class="mono" style="font-size:12px; color:var(--text2); min-width:40px;"></span>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="saveSettings()">설정 저장</button>
      </div>

      <div class="card">
        <div class="card-title">알림 조건</div>
        <div style="font-size:12px; color:var(--text3); margin-bottom:1rem; font-family:'DM Mono',monospace;">환율 새로고침 시 조건 충족 여부를 자동 표시합니다</div>
        <div class="input-group">
          <label class="input-label">2단계 알림 기준 (원 이하)</label>
          <input type="number" id="setAlert2" step="1">
        </div>
        <div class="input-group">
          <label class="input-label">3단계 알림 기준 (원 이하)</label>
          <input type="number" id="setAlert3" step="1">
        </div>
        <div style="font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; margin-top:0.5rem; padding:0.75rem; background:var(--bg3); border-radius:var(--radius-sm);">
          브라우저 알림을 허용하면 조건 충족 시 알림을 받을 수 있습니다.
          <br><br>
          <button class="btn btn-ghost btn-sm" onclick="requestNotif()">알림 권한 요청</button>
        </div>
        <hr class="divider">
        <div class="card-title" style="margin-top:0;">데이터 관리</div>
        <div class="flex-row">
          <button class="btn btn-ghost btn-sm" onclick="exportData()">데이터 내보내기</button>
          <button class="btn btn-danger btn-sm" onclick="resetAll()">전체 초기화</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
// ============================
// STATE
// ============================
let state = {
  currentRate: 1520,
  lastFetch: null,
  settings: {
    budget: 10000000,
    goal: 6600,
    ma20: 1480,
    tranches: 3,
    gap: 20,
    alert2: 1500,
    alert3: 1480,
  },
  records: [],
  events: [
    { id:'e1', name:'미국-이란 휴전 협상 타결', desc:'유가 급락 → 원화 강세', drop:40, done:false },
    { id:'e2', name:'FOMC 금리 인하 신호', desc:'달러 약세 전환 기대', drop:25, done:false },
    { id:'e3', name:'유가 배럴당 80달러 이하', desc:'에너지 리스크 완화', drop:30, done:false },
    { id:'e4', name:'트럼프 무역 협상 타결', desc:'달러 인덱스 하락 기대', drop:20, done:false },
  ],
  rateHistory: [],
};

let rateChart = null;
let stratChart = null;

// ============================
// STORAGE
// ============================
function save() {
  try { localStorage.setItem('exchTracker', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('exchTracker');
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch(e) {}
}

// ============================
// UTILS
// ============================
const fmt = n => Math.round(n).toLocaleString('ko-KR');
const fmtD = n => Math.round(n).toLocaleString('ko-KR');

function today() {
  return new Date().toISOString().split('T')[0];
}

function statusInfo(rate, ma20) {
  const diff = rate - ma20;
  if (diff > 30) return { label:'고평가 — 대기', cls:'badge-danger', dotCls:'dot-red', alertCls:'alert-red' };
  if (diff > 0) return { label:'주의 구간', cls:'badge-warn', dotCls:'dot-amber', alertCls:'alert-amber' };
  return { label:'매수 구간', cls:'badge-ok', dotCls:'dot-green', alertCls:'alert-green' };
}

// ============================
// FETCH RATE
// ============================
function fetchRate() {
  // 직접 입력 모달 표시
  showRateInput();
}

function showRateInput() {
  const current = state.currentRate || '';
  const existing = document.getElementById('rateInputModal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'rateInputModal';
  modal.style.cssText = `
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  `;
  modal.innerHTML = `
    <div style="background:#1e2023; border:0.5px solid rgba(255,255,255,0.14); border-radius:16px; padding:1.5rem; width:100%; max-width:340px;">
      <div style="font-size:13px; font-weight:500; color:#f0f0ee; margin-bottom:4px;">오늘 환율 입력</div>
      <div style="font-size:11px; color:#5a5a56; font-family:'DM Mono',monospace; margin-bottom:1.25rem;">
        네이버 금융 / 하나은행 / 하나머니 앱에서 확인한<br>현재 매매기준율을 입력하세요
      </div>
      <div style="display:flex; gap:8px; align-items:center; margin-bottom:1rem;">
        <input
          type="number"
          id="manualRateInput"
          value="${current}"
          placeholder="예: 1520"
          step="1"
          style="flex:1; font-size:20px; font-family:'DM Mono',monospace; font-weight:500;
            background:#0e0f11; border:0.5px solid rgba(255,255,255,0.2);
            border-radius:10px; padding:12px 14px; color:#f0f0ee; outline:none;"
          autofocus
        >
        <span style="font-size:13px; color:#5a5a56; font-family:'DM Mono',monospace; white-space:nowrap;">원 / $</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button onclick="applyManualRate()" style="
          flex:1; padding:11px; background:#e8ff57; color:#000;
          border:none; border-radius:10px; font-size:14px; font-weight:500;
          cursor:pointer; font-family:'Noto Sans KR',sans-serif;">
          저장
        </button>
        <button onclick="document.getElementById('rateInputModal').remove()" style="
          padding:11px 16px; background:transparent; color:#9a9a95;
          border:0.5px solid rgba(255,255,255,0.14); border-radius:10px;
          font-size:13px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;">
          취소
        </button>
      </div>
      <div style="margin-top:1rem; padding:0.75rem; background:#0e0f11; border-radius:8px;">
        <div style="font-size:10px; color:#5a5a56; font-family:'DM Mono',monospace; line-height:1.8;">
          📌 환율 확인 방법<br>
          • 네이버 검색: "달러 환율"<br>
          • 하나은행 앱 → 환율 조회<br>
          • 한국수출입은행: www.koreaexim.go.kr
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // 배경 클릭 시 닫기
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  // 엔터키
  setTimeout(() => {
    const inp = document.getElementById('manualRateInput');
    if (inp) {
      inp.focus();
      inp.select();
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') applyManualRate(); });
    }
  }, 50);
}

function applyManualRate() {
  const val = parseFloat(document.getElementById('manualRateInput').value);
  if (!val || val < 900 || val > 2500) {
    alert('올바른 환율을 입력해주세요 (900 ~ 2500 범위)');
    return;
  }
  state.currentRate = Math.round(val);
  state.lastFetch = new Date().toLocaleString('ko-KR') + ' (직접 입력)';
  const today_ = today();
  const existing = state.rateHistory.find(r => r.date === today_);
  if (existing) { existing.rate = state.currentRate; }
  else {
    state.rateHistory.push({ date: today_, rate: state.currentRate });
    if (state.rateHistory.length > 90) state.rateHistory.shift();
  }
  save();
  render();
  checkAlerts();
  document.getElementById('rateInputModal').remove();
}

function checkAlerts() {
  const r = state.currentRate;
  const s = state.settings;
  if (r <= s.alert3 && Notification.permission === 'granted') {
    new Notification('📈 환전 트래커', { body: `현재 환율 ${fmt(r)}원 — 3단계 분할 매수 시작 조건!` });
  } else if (r <= s.alert2 && Notification.permission === 'granted') {
    new Notification('📈 환전 트래커', { body: `현재 환율 ${fmt(r)}원 — 2단계 이벤트 트리거 검토` });
  }
}

// ============================
// RENDER
// ============================
function render() {
  renderHeader();
  renderKPI();
  renderGoal();
  renderRateChart();
  renderEventsDash();
  renderStrategy2();
  renderStrategy3();
  renderStratChart();
  renderRecords();
  renderSettings();
  renderAlerts();
}

function renderHeader() {
  const r = state.currentRate;
  const s = statusInfo(r, state.settings.ma20);
  document.getElementById('heroRate').textContent = fmt(r);
  document.getElementById('heroBadge').innerHTML = `<span class="rate-badge ${s.cls}">${s.label}</span>`;
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${state.lastFetch || '—'}`;
}

function renderAlerts() {
  const r = state.currentRate;
  const s = state.settings;
  let html = '';
  if (r <= s.alert3) {
    html += `<div class="alert-bar alert-green fade-in"><span class="dot dot-green"></span><strong>3단계 조건 충족!</strong> 현재 환율 ${fmt(r)}원 — MA20 분할 매수 시작하세요</div>`;
  } else if (r <= s.alert2) {
    html += `<div class="alert-bar alert-amber fade-in"><span class="dot dot-amber"></span><strong>2단계 조건 접근</strong> 현재 환율 ${fmt(r)}원 — 이벤트 트리거 주시하세요</div>`;
  } else {
    html += `<div class="alert-bar alert-red fade-in"><span class="dot dot-red"></span>현재 환율 ${fmt(r)}원 — 고평가 구간. 대기를 권장합니다</div>`;
  }
  document.getElementById('alertArea').innerHTML = html;
}

function renderKPI() {
  const r = state.currentRate;
  const ma20 = state.settings.ma20;
  const diff = r - ma20;
  const diffPct = ((diff/ma20)*100).toFixed(1);
  const totalUsd = state.records.reduce((s,x)=>s+Math.round(x.amount/x.rate),0);
  const avgRate = state.records.length > 0
    ? Math.round(state.records.reduce((s,x)=>s+x.rate*Math.round(x.amount/x.rate),0) / totalUsd)
    : 0;

  const items = [
    { label:'현재 환율', val: fmt(r)+'원', sub:'USD/KRW', color:'var(--text)' },
    { label:'MA20 대비', val: (diff>=0?'+':'')+fmt(diff)+'원', sub: diffPct+'% 프리미엄', color: diff>30?'var(--red)':diff>0?'var(--amber)':'var(--green)' },
    { label:'환전 완료 달러', val: '$'+fmt(totalUsd), sub: totalUsd>0?'평균 '+fmt(avgRate)+'원':'기록 없음', color:'var(--green)' },
    { label:'잔여 예산', val: fmt(Math.max(0, state.settings.budget - state.records.reduce((s,x)=>s+x.amount,0)))+'원', sub:'총 '+fmt(state.settings.budget)+'원', color:'var(--blue)' },
  ];

  document.getElementById('kpiGrid').innerHTML = items.map(i=>`
    <div class="card card-sm">
      <div class="metric-label">${i.label}</div>
      <div class="metric-val" style="color:${i.color}; font-size:18px;">${i.val}</div>
      <div class="metric-sub">${i.sub}</div>
    </div>
  `).join('');
}

function renderGoal() {
  const goal = state.settings.goal;
  const totalUsd = state.records.reduce((s,x)=>s+Math.round(x.amount/x.rate),0);
  const pct = Math.min(100, Math.round(totalUsd/goal*100));
  const remaining = Math.max(0, goal - totalUsd);

  document.getElementById('goalProgress').innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
      <span style="font-family:'DM Mono',monospace; font-size:24px; font-weight:500; color:var(--accent);">$${fmt(totalUsd)}</span>
      <span style="font-family:'DM Mono',monospace; font-size:13px; color:var(--text3);">/ $${fmt(goal)} 목표</span>
    </div>
    <div class="progress-bar" style="height:8px;">
      <div class="progress-fill" style="width:${pct}%; background: linear-gradient(90deg, #4ade80, #e8ff57);"></div>
    </div>
    <div class="progress-label">
      <span>${pct}% 달성</span>
      <span>잔여 $${fmt(remaining)}</span>
    </div>
  `;
}

function renderRateChart() {
  const ctx = document.getElementById('rateChart').getContext('2d');

  let labels, data;
  if (state.rateHistory.length > 1) {
    const sorted = [...state.rateHistory].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
    labels = sorted.map(r => r.date.slice(5));
    data = sorted.map(r => r.rate);
  } else {
    // 시뮬 데이터
    labels = [];
    data = [];
    const base = 1480;
    for (let i=29; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      labels.push((d.getMonth()+1)+'/'+(d.getDate()));
      data.push(base + Math.round(Math.sin(i*0.3)*40 + (29-i)*1.5 + Math.random()*15));
    }
  }

  const ma20 = state.settings.ma20;
  const ma20Line = Array(data.length).fill(ma20);

  if (rateChart) rateChart.destroy();
  rateChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'USD/KRW',
          data,
          borderColor: '#e8ff57',
          backgroundColor: 'rgba(232,255,87,0.06)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
        },
        {
          label: 'MA20',
          data: ma20Line,
          borderColor: 'rgba(96,165,250,0.5)',
          borderWidth: 1,
          borderDash: [4,4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' '+Math.round(ctx.raw).toLocaleString()+'원'
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#5a5a56', font: { size: 10, family: 'DM Mono' }, maxTicksLimit: 8 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#5a5a56', font: { size: 10, family: 'DM Mono' }, callback: v => fmt(v) }
        }
      }
    }
  });
}

function renderEventsDash() {
  document.getElementById('eventListDash').innerHTML = state.events.map(e => `
    <div class="event-item" onclick="toggleEvent('${e.id}')">
      <div class="event-check ${e.done?'checked':''}"></div>
      <div>
        <div class="event-name">${e.name}</div>
        <div class="event-desc">${e.desc}</div>
        <div class="event-impact" style="color:${e.done?'var(--green)':'var(--text3)'};">
          ${e.done ? '✓ 트리거 확인됨' : `예상 환율 하락: -${e.drop}원 → ${fmt(state.currentRate-e.drop)}원`}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleEvent(id) {
  const e = state.events.find(x=>x.id===id);
  if (e) { e.done = !e.done; save(); render(); }
}

function renderStrategy2() {
  const s = state.settings;
  const half = s.budget * 0.5;
  const sel = state.events.filter(e=>!e.done);
  const n = sel.length || 1;
  const perEvent = Math.round(half / n);

  let rows = state.events.map(e => {
    const rate = state.currentRate - e.drop;
    const usd = Math.round(perEvent / rate);
    return `
      <div class="tranche-item">
        <div class="tranche-num" style="background:${e.done?'var(--green-dim)':'var(--bg3)'}; color:${e.done?'var(--green)':'var(--text3)'};">
          ${e.done?'✓':'→'}
        </div>
        <div class="tranche-info">
          <div class="tranche-price">${e.name}</div>
          <div class="tranche-desc">예상 ${fmt(rate)}원 / ${e.desc}</div>
        </div>
        <div class="tranche-right">
          <div class="tranche-usd">$${fmt(usd)}</div>
          <div class="tranche-won">${fmt(perEvent)}원</div>
        </div>
      </div>
    `;
  }).join('');

  const avgRate = state.events.length > 0
    ? Math.round(state.events.reduce((s,e)=>s+(state.currentRate-e.drop),0)/state.events.length)
    : state.currentRate;
  const totalUsd = Math.round(half / avgRate);

  document.getElementById('strategy2Detail').innerHTML = rows + `
    <hr class="divider">
    <div class="sum-row total">
      <span class="sum-label">예상 취득 달러</span>
      <span class="sum-val">$${fmt(totalUsd)}</span>
    </div>
    <div style="font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; margin-top:4px;">평균 환율 ${fmt(avgRate)}원 기준</div>
  `;
}

function renderStrategy3() {
  const s = state.settings;
  const half = s.budget * 0.5;
  const n = s.tranches;
  const gap = s.gap;
  const weightSets = { 2:[40,60], 3:[25,35,40], 4:[20,25,30,25], 5:[15,20,25,20,20] };
  const weights = weightSets[n] || weightSets[3];
  const colors = ['#9FE1CB','#5DCAA5','#1D9E75','#0F6E56','#085041'];
  const bgColors = ['rgba(159,225,203,0.15)','rgba(93,202,165,0.12)','rgba(29,158,117,0.1)','rgba(15,110,86,0.1)','rgba(8,80,65,0.1)'];

  let rows = '';
  for (let i=0; i<n; i++) {
    const price = s.ma20 - (i * gap);
    const pct = weights[i];
    const amount = Math.round(half * pct / 100);
    const usd = Math.round(amount / price);
    const isActive = state.currentRate <= price;
    rows += `
      <div class="tranche-item ${isActive?'active-tranche':''}">
        <div class="tranche-num" style="background:${bgColors[i]}; color:${colors[i]};">${i+1}</div>
        <div class="tranche-info">
          <div class="tranche-price">${fmt(price)}원 이하</div>
          <div class="tranche-desc">MA20 - ${i*gap}원 / 비중 ${pct}%</div>
          <div class="progress-bar" style="height:3px; margin-top:4px;">
            <div class="progress-fill" style="width:${pct}%; background:${colors[i]};"></div>
          </div>
        </div>
        <div class="tranche-right">
          <div class="tranche-usd" style="color:${colors[i]};">$${fmt(usd)}</div>
          <div class="tranche-won">${fmt(amount)}원</div>
        </div>
      </div>
    `;
  }

  const totalUsd3 = Math.round(half / s.ma20);
  document.getElementById('strategy3Detail').innerHTML = rows + `
    <hr class="divider">
    <div class="sum-row total">
      <span class="sum-label">예상 취득 달러</span>
      <span class="sum-val">$${fmt(totalUsd3)}</span>
    </div>
    <div style="font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; margin-top:4px;">평균 환율 MA20 ${fmt(s.ma20)}원 기준</div>
  `;
}

function renderStratChart() {
  const s = state.settings;
  const budget = s.budget;
  const half = budget * 0.5;
  const cur = state.currentRate;
  const ma20 = s.ma20;

  const avgEventRate = Math.round(state.events.reduce((s,e)=>s+(cur-e.drop),0)/state.events.length);
  const usd2 = Math.round(half / avgEventRate);
  const usd3 = Math.round(half / ma20);
  const usdNow = Math.round(budget / cur);
  const totalUsd = usd2 + usd3;
  const avgFinal = Math.round(budget / totalUsd);
  const saving = Math.round((cur - avgFinal) * totalUsd);
  const savingPct = ((saving / (cur * totalUsd)) * 100).toFixed(1);

  const ctx = document.getElementById('stratChart').getContext('2d');
  if (stratChart) stratChart.destroy();
  stratChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['즉시 환전', '2단계', '3단계'],
      datasets: [{
        data: [usdNow, usd2, usd3],
        backgroundColor: ['rgba(90,90,86,0.4)', 'rgba(96,165,250,0.6)', 'rgba(74,222,128,0.6)'],
        borderRadius: 6,
        barThickness: 32,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c=>' $'+Math.round(c.raw).toLocaleString() } } },
      scales: {
        x: { grid: { display: false }, ticks: { color:'#5a5a56', font:{ size:10, family:'DM Mono' } } },
        y: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#5a5a56', font:{ size:10, family:'DM Mono' }, callback: v=>'$'+Math.round(v/1000)+'k' } }
      }
    }
  });

  document.getElementById('stratSummary').innerHTML = `
    <div class="sum-row"><span class="sum-label">2단계 취득 달러</span><span class="sum-val" style="color:var(--blue);">$${fmt(usd2)}</span></div>
    <div class="sum-row"><span class="sum-label">3단계 취득 달러</span><span class="sum-val" style="color:var(--green);">$${fmt(usd3)}</span></div>
    <div class="sum-row total"><span class="sum-label">전략 합계</span><span class="sum-val">$${fmt(totalUsd)}</span></div>
    <div class="sum-row"><span class="sum-label">예상 평균 환율</span><span class="sum-val">${fmt(avgFinal)}원</span></div>
    <div class="sum-row"><span class="sum-label">즉시 대비 절약</span><span class="sum-val" style="color:var(--green);">+${fmt(saving)}원</span></div>
    <div class="sum-row"><span class="sum-label">절약률</span><span class="sum-val" style="color:var(--green);">${savingPct}%</span></div>
    <div class="sum-row"><span class="sum-label">즉시 환전 취득</span><span class="sum-val" style="color:var(--text3);">$${fmt(usdNow)}</span></div>
  `;
}

function addRecord() {
  const date = document.getElementById('recDate').value || today();
  const rate = parseFloat(document.getElementById('recRate').value);
  const amount = parseFloat(document.getElementById('recAmount').value);
  const note = document.getElementById('recNote').value;

  if (!rate || !amount) { alert('환율과 금액을 입력하세요.'); return; }

  state.records.push({ id: Date.now(), date, rate, amount, note });
  state.rateHistory.push({ date, rate });
  if (state.rateHistory.length > 90) state.rateHistory.shift();

  document.getElementById('recRate').value = '';
  document.getElementById('recAmount').value = '';
  document.getElementById('recNote').value = '';

  save();
  render();
}

function deleteRecord(id) {
  state.records = state.records.filter(r=>r.id!==id);
  save();
  render();
}

function renderRecords() {
  const recs = [...state.records].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('recCount').textContent = recs.length + '건';

  if (recs.length === 0) {
    document.getElementById('recordsTable').innerHTML = `<div class="empty-state">환전 내역이 없습니다<br>위에서 추가해주세요</div>`;
    document.getElementById('recSummaryCard').innerHTML = '';
    return;
  }

  const rows = recs.map(r => {
    const usd = Math.round(r.amount / r.rate);
    return `
      <tr>
        <td>${r.date}</td>
        <td class="td-rate">${fmt(r.rate)}원</td>
        <td>${fmt(r.amount)}원</td>
        <td class="td-usd">$${fmt(usd)}</td>
        <td style="color:var(--text3);">${r.note||'—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteRecord(${r.id})" style="padding:3px 8px;">✕</button></td>
      </tr>
    `;
  }).join('');

  document.getElementById('recordsTable').innerHTML = `
    <div class="record-wrap">
    <table class="record-table">
      <thead><tr>
        <th>날짜</th><th>환율</th><th>금액(원)</th><th>달러</th><th>메모</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  `;

  // 요약
  const totalWon = state.records.reduce((s,r)=>s+r.amount,0);
  const totalUsd = state.records.reduce((s,r)=>s+Math.round(r.amount/r.rate),0);
  const avgRate = totalUsd > 0 ? Math.round(totalWon/totalUsd) : 0;
  const curVal = Math.round(totalUsd * state.currentRate);
  const gain = curVal - totalWon;

  document.getElementById('recSummaryCard').innerHTML = `
    <div class="card-title">환전 실적 요약</div>
    <div class="grid4">
      <div class="metric"><div class="metric-label">총 환전금액</div><div class="metric-val" style="font-size:16px;">${fmt(totalWon)}원</div></div>
      <div class="metric"><div class="metric-label">취득 달러</div><div class="metric-val" style="font-size:16px; color:var(--green);">$${fmt(totalUsd)}</div></div>
      <div class="metric"><div class="metric-label">평균 환율</div><div class="metric-val" style="font-size:16px; color:var(--blue);">${fmt(avgRate)}원</div></div>
      <div class="metric"><div class="metric-label">현재 평가손익</div><div class="metric-val" style="font-size:16px; color:${gain>=0?'var(--green)':'var(--red)'};">${gain>=0?'+':''}${fmt(gain)}원</div></div>
    </div>
  `;
}

function renderSettings() {
  const s = state.settings;
  document.getElementById('setBudget').value = s.budget;
  document.getElementById('setGoal').value = s.goal;
  document.getElementById('setMA20').value = s.ma20;
  document.getElementById('setTranches').value = s.tranches;
  document.getElementById('setGap').value = s.gap;
  document.getElementById('setAlert2').value = s.alert2;
  document.getElementById('setAlert3').value = s.alert3;
  document.getElementById('trancheVal').textContent = s.tranches + '구간';
  document.getElementById('gapVal').textContent = s.gap + '원';
  document.getElementById('recDate').value = today();
}

function saveSettings() {
  state.settings = {
    budget: parseFloat(document.getElementById('setBudget').value) || 10000000,
    goal: parseFloat(document.getElementById('setGoal').value) || 6600,
    ma20: parseFloat(document.getElementById('setMA20').value) || 1480,
    tranches: parseInt(document.getElementById('setTranches').value) || 3,
    gap: parseInt(document.getElementById('setGap').value) || 20,
    alert2: parseFloat(document.getElementById('setAlert2').value) || 1500,
    alert3: parseFloat(document.getElementById('setAlert3').value) || 1480,
  };
  save();
  render();
  alert('설정이 저장됐습니다.');
}

// ============================
// TAB
// ============================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

// ============================
// MISC
// ============================
function requestNotif() {
  if ('Notification' in window) {
    Notification.requestPermission().then(p => {
      alert(p === 'granted' ? '알림이 허용됐습니다.' : '알림이 거부됐습니다.');
    });
  } else {
    alert('이 브라우저는 알림을 지원하지 않습니다.');
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'exchange_tracker_' + today() + '.json';
  a.click();
}

function resetAll() {
  if (confirm('모든 데이터를 삭제하시겠습니까?')) {
    localStorage.removeItem('exchTracker');
    location.reload();
  }
}

// ============================
// INIT
// ============================
load();
render();
// 저장된 환율 없으면 입력 유도
if (!state.lastFetch) {
  setTimeout(showRateInput, 600);
}
</script>
</body>
</html>
